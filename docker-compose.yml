version: '3.8'
services:
  mongodb:
    image: mongo:7.0
    container_name: fullstack-cafe-mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - mongo-data:/data/db
    networks:
      - cafe-network

volumes:
  mongo-data:

networks:
  cafe-network:
    driver: bridge

